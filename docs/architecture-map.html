<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vir — Architecture Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface-2: #1c1c26;
    --surface-3: #252533;
    --border: #2a2a3a;
    --border-strong: #3a3a4f;
    --text: #e2e2f0;
    --text-muted: #8a8aa8;
    --text-dim: #5a5a78;
    --accent: #7c6af7;
    --accent-2: #3ecf8e;
    --accent-3: #f7a236;
    --accent-4: #e95f7a;
    --accent-5: #4ab8d4;
    --accent-6: #b86af7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(124, 106, 247, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(62, 207, 142, 0.04) 0%, transparent 40%);
  }

  /* Header */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    z-index: 100;
  }

  .brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .brand .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 8px var(--accent);
  }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
  }
  .meta span strong { color: var(--text-muted); font-weight: 500; margin-right: 4px; }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }
  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px 6px 30px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    width: 220px;
    outline: none;
    transition: border-color 0.15s, width 0.15s;
  }
  #search:focus { border-color: var(--accent); width: 280px; }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }

  /* Tabs */
  .tabs {
    position: fixed;
    top: 56px; left: 0; right: 0;
    height: 44px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 16px;
    z-index: 90;
  }
  .tab {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 0 16px;
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 16px; right: 16px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }
  .tab .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-left: 6px;
    padding: 1px 5px;
    background: var(--surface-2);
    border-radius: 3px;
  }

  /* Canvas */
  #canvas-wrap {
    position: fixed;
    top: 100px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-wrap.dragging { cursor: grabbing; }
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 4000px;
    height: 3000px;
    transform-origin: 0 0;
    transition: transform 0.0s;
  }
  #canvas.animate { transition: transform 0.25s ease; }

  /* Edges SVG */
  #edges {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  #edges path {
    fill: none;
    stroke: var(--border-strong);
    stroke-width: 1.2;
    transition: stroke 0.2s, opacity 0.2s;
  }
  #edges path.highlight {
    stroke: var(--accent);
    stroke-width: 1.8;
  }

  /* Nodes */
  .node {
    position: absolute;
    min-width: 140px;
    max-width: 240px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    z-index: 2;
    transition: border-color 0.15s, box-shadow 0.15s, opacity 0.2s, transform 0.1s;
  }
  .node:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px var(--border-strong);
  }
  .node.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 4px 24px rgba(124, 106, 247, 0.25);
  }
  .node.dim { opacity: 0.25; }
  .node .label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    word-break: break-word;
  }
  .node .type-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .node .sub {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 400;
  }

  /* Type colors */
  .node[data-type="page"]       .type-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .node[data-type="api"]        .type-dot { background: var(--accent-5); box-shadow: 0 0 6px var(--accent-5); }
  .node[data-type="layout"]     .type-dot { background: var(--accent-6); box-shadow: 0 0 6px var(--accent-6); }
  .node[data-type="middleware"] .type-dot { background: var(--accent-3); box-shadow: 0 0 6px var(--accent-3); }
  .node[data-type="module"]     .type-dot { background: var(--accent-5); box-shadow: 0 0 6px var(--accent-5); }
  .node[data-type="component"]  .type-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .node[data-type="hook"]       .type-dot { background: var(--accent-6); box-shadow: 0 0 6px var(--accent-6); }
  .node[data-type="util"]       .type-dot { background: var(--text-muted); }
  .node[data-type="input"]      .type-dot { background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2); }
  .node[data-type="transform"]  .type-dot { background: var(--accent-5); box-shadow: 0 0 6px var(--accent-5); }
  .node[data-type="persist"]    .type-dot { background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2); }
  .node[data-type="output"]     .type-dot { background: var(--accent-3); box-shadow: 0 0 6px var(--accent-3); }
  .node[data-type="external"]   .type-dot { background: var(--accent-4); box-shadow: 0 0 6px var(--accent-4); }
  .node[data-type="database"]   .type-dot { background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2); }
  .node[data-type="auth"]       .type-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .node[data-type="payment"]    .type-dot { background: var(--accent-3); box-shadow: 0 0 6px var(--accent-3); }
  .node[data-type="email"]      .type-dot { background: var(--accent-5); box-shadow: 0 0 6px var(--accent-5); }
  .node[data-type="ai"]         .type-dot { background: var(--accent-6); box-shadow: 0 0 6px var(--accent-6); }
  .node[data-type="storage"]    .type-dot { background: var(--text-muted); }
  .node[data-type="monitoring"] .type-dot { background: var(--accent-4); box-shadow: 0 0 6px var(--accent-4); }
  .node[data-type="other"]      .type-dot { background: var(--text-dim); }

  /* Detail panel */
  #panel {
    position: fixed;
    top: 100px; right: -360px;
    width: 340px;
    bottom: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    transition: right 0.25s ease;
    z-index: 80;
    overflow-y: auto;
    padding: 24px;
  }
  #panel.open { right: 0; }
  #panel .close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
  }
  #panel .close:hover { color: var(--text); }
  #panel h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    word-break: break-word;
    padding-right: 30px;
  }
  #panel .badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #panel .path {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 16px;
    word-break: break-all;
  }
  #panel .detail {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 20px;
  }
  #panel .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    margin-top: 16px;
  }
  #panel ul { list-style: none; }
  #panel li {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    padding: 6px 8px;
    margin-bottom: 2px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  #panel li:hover { border-color: var(--accent); }
  #panel li.empty { color: var(--text-dim); cursor: default; background: none; border: none; padding: 0; font-style: italic; }

  /* Legend */
  #legend {
    position: fixed;
    bottom: 20px; left: 20px;
    background: rgba(19, 19, 26, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    z-index: 70;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    min-width: 140px;
  }
  #legend .legend-title {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  #legend .item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; color: var(--text-muted); }
  #legend .dot { width: 6px; height: 6px; border-radius: 50%; }

  /* Zoom indicator */
  #zoom-indicator {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    background: rgba(19, 19, 26, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 4px;
    z-index: 70;
  }

  /* Help hint */
  #help {
    position: fixed;
    top: 116px; left: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    z-index: 70;
    line-height: 1.6;
    pointer-events: none;
  }
  #help kbd {
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    color: var(--text-muted);
  }

  /* Empty state */
  .empty-state {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
</style>
</head>

    if (activeLayer === layerName) return;
    activeLayer = layerName;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.layer === layerName);
    });
    closePanel();
    renderLayer();
    renderLegend();
    resetView(true);

  function renderLayer() {
    const canvas = document.getElementById('canvas');
    // Clear all nodes (keep SVG)
    canvas.querySelectorAll('.node, .empty-state').forEach(el => el.remove());
    const svg = document.getElementById('edges');
    svg.innerHTML = '';

    const layer = GRAPH_DATA.layers[activeLayer];
    if (!layer || layer.nodes.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = `No data for ${activeLayer}`;
      canvas.appendChild(empty);
      return;
    }

    const positioned = computeLayout(layer.nodes, layer.edges || []);

    // Render edges first (under nodes)
    const edges = layer.edges || [];
    edges.forEach(e => {
      const from = positioned.find(n => n.id === e.from);
      const to = positioned.find(n => n.id === e.to);
      if (!from || !to) return;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const x1 = from.x + 80, y1 = from.y + 20;
      const x2 = to.x + 80, y2 = to.y + 20;
      const midX = (x1 + x2) / 2;
      path.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
      path.dataset.from = e.from;
      path.dataset.to = e.to;
      svg.appendChild(path);
    });

    // Set SVG viewport to canvas size
    svg.setAttribute('viewBox', '0 0 4000 3000');
    svg.setAttribute('width', '4000');
    svg.setAttribute('height', '3000');

    // Render nodes
    positioned.forEach(n => {
      const el = document.createElement('div');
      el.className = 'node';
      el.dataset.id = n.id;
      el.dataset.type = n.type || 'other';
      el.style.left = n.x + 'px';
      el.style.top = n.y + 'px';
      const sub = n.path ? `<div class="sub">${escapeHtml(truncate(n.path, 36))}</div>` : '';
      el.innerHTML = `
        <div class="label"><span class="type-dot"></span>${escapeHtml(n.label)}</div>
        ${sub}
      `;
      el.addEventListener('click', (ev) => { ev.stopPropagation(); selectNode(n.id); });
      el.addEventListener('mouseenter', () => highlightConnections(n.id));
      el.addEventListener('mouseleave', () => clearHighlights());
      canvas.appendChild(el);
    });
  }

  // ============================================================
  // LAYOUT
  // ============================================================
  function computeLayout(nodes, edges) {
    const count = nodes.length;
    // Hierarchical layered layout for clarity
    // Group by "depth" using BFS from nodes with no incoming edges
    const incoming = {};
    nodes.forEach(n => incoming[n.id] = 0);
    edges.forEach(e => { if (incoming[e.to] !== undefined) incoming[e.to]++; });
    const roots = nodes.filter(n => incoming[n.id] === 0).map(n => n.id);
    const depth = {};
    nodes.forEach(n => depth[n.id] = 0);
    const queue = roots.map(id => ({ id, d: 0 }));
    const visited = new Set();
    while (queue.length) {
      const { id, d } = queue.shift();
      if (visited.has(id)) continue;
      visited.add(id);
      depth[id] = Math.max(depth[id] || 0, d);
      edges.filter(e => e.from === id).forEach(e => {
        if (!visited.has(e.to)) queue.push({ id: e.to, d: d + 1 });
      });
    }
    // Nodes with no edges go in their own "isolated" depth
    const maxDepth = Math.max(...Object.values(depth), 0);
    const byDepth = {};
    nodes.forEach(n => {
      const d = depth[n.id] || 0;
      (byDepth[d] = byDepth[d] || []).push(n);
    });

    const colWidth = 280;
    const rowHeight = 90;
    const startX = 100;
    const startY = 80;
    const positioned = [];

    Object.keys(byDepth).sort((a,b)=>+a-+b).forEach(d => {
      const col = byDepth[d];
      col.forEach((n, i) => {
        positioned.push({
          ...n,
          x: startX + (+d) * colWidth,
          y: startY + i * rowHeight
        });
      });
    });

    return positioned;
  }

  // ============================================================
  // PANEL
  // ============================================================
  function selectNode(id) {
    const layer = GRAPH_DATA.layers[activeLayer];
    const node = layer.nodes.find(n => n.id === id);
    if (!node) return;
    selectedNode = id;
    document.querySelectorAll('.node').forEach(el => {
      el.classList.toggle('selected', el.dataset.id === id);
    });

    const dependsOn = (node.deps || []).map(depId => {
      const dep = layer.nodes.find(n => n.id === depId);
      return dep ? dep.label : depId;
    });
    const dependents = layer.nodes
      .filter(n => (n.deps || []).includes(id))
      .map(n => n.label);

    const html = `
      <h2>${escapeHtml(node.label)}</h2>
      <span class="badge">${TYPE_LABELS[node.type] || node.type || 'node'}</span>
      ${node.path ? `<div class="path">${escapeHtml(node.path)}</div>` : ''}
      <div class="detail">${escapeHtml(node.detail || 'No description available.')}</div>
      <div class="section-title">Depends on (${dependsOn.length})</div>
      <ul>${dependsOn.length
        ? dependsOn.map(d => `<li>${escapeHtml(d)}</li>`).join('')
        : '<li class="empty">no dependencies</li>'}</ul>
      <div class="section-title">Used by (${dependents.length})</div>
      <ul>${dependents.length
        ? dependents.map(d => `<li>${escapeHtml(d)}</li>`).join('')
        : '<li class="empty">no consumers</li>'}</ul>
    `;
    document.getElementById('panel-content').innerHTML = html;
    document.getElementById('panel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    selectedNode = null;
    document.querySelectorAll('.node.selected').forEach(el => el.classList.remove('selected'));
  }

  // ============================================================
  // HIGHLIGHTS
  // ============================================================
  function highlightConnections(id) {
    const connected = new Set([id]);
    const layer = GRAPH_DATA.layers[activeLayer];
    (layer.edges || []).forEach(e => {
      if (e.from === id) connected.add(e.to);
      if (e.to === id) connected.add(e.from);
    });
    document.querySelectorAll('.node').forEach(el => {
      el.classList.toggle('dim', !connected.has(el.dataset.id));
    });
    document.querySelectorAll('#edges path').forEach(p => {
      const touches = p.dataset.from === id || p.dataset.to === id;
      p.classList.toggle('highlight', touches);
      p.style.opacity = touches ? '1' : '0.2';
    });
  }

  function clearHighlights() {
    document.querySelectorAll('.node').forEach(el => el.classList.remove('dim'));
    document.querySelectorAll('#edges path').forEach(p => {
      p.classList.remove('highlight');
      p.style.opacity = '';
    });
  }

    const map = {
      page: '--accent', api: '--accent-5', layout: '--accent-6', middleware: '--accent-3',
      module: '--accent-5', component: '--accent', hook: '--accent-6', util: '--text-muted',
      input: '--accent-2', transform: '--accent-5', persist: '--accent-2',
      output: '--accent-3', external: '--accent-4',
      database: '--accent-2', auth: '--accent', payment: '--accent-3', email: '--accent-5',
      ai: '--accent-6', storage: '--text-muted', monitoring: '--accent-4', other: '--text-dim'
    };
    return map[t] || '--text-dim';
  }

  // ============================================================
  // PAN / ZOOM
  // ============================================================
  function setupInteraction() {
    const wrap = document.getElementById('canvas-wrap');
    const canvas = document.getElementById('canvas');

    wrap.addEventListener('mousedown', (e) => {
      if (e.target.closest('.node')) return;
      isDragging = true;
      wrap.classList.add('dragging');
      dragStart = { x: e.clientX - panX, y: e.clientY - panY };
      canvas.classList.remove('animate');
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      panX = e.clientX - dragStart.x;
      panY = e.clientY - dragStart.y;
      applyTransform();
    });
    window.addEventListener('mouseup', () => {
      isDragging = false;
      document.getElementById('canvas-wrap').classList.remove('dragging');
    });

    wrap.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = -e.deltaY * 0.001;
      const newScale = Math.max(0.2, Math.min(2.5, scale + delta));
      // Zoom toward cursor
      const rect = wrap.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      panX = mx - (mx - panX) * (newScale / scale);
      panY = my - (my - panY) * (newScale / scale);
      scale = newScale;
      applyTransform();
    }, { passive: false });

    wrap.addEventListener('dblclick', (e) => {
      if (e.target.closest('.node')) return;
      resetView(true);
    });

    wrap.addEventListener('click', (e) => {
      if (!e.target.closest('.node') && !e.target.closest('#panel')) {
        closePanel();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePanel();
    });
  }

  function applyTransform() {
    const canvas = document.getElementById('canvas');
    canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    document.getElementById('zoom-indicator').textContent = Math.round(scale * 100) + '%';
  }

  function resetView(animate) {
    const canvas = document.getElementById('canvas');
    // Find bounds of nodes
    const nodes = canvas.querySelectorAll('.node');
    if (nodes.length === 0) { panX = 0; panY = 0; scale = 1; applyTransform(); return; }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nodes.forEach(n => {
      const x = parseInt(n.style.left), y = parseInt(n.style.top);
      const w = n.offsetWidth, h = n.offsetHeight;
      minX = Math.min(minX, x);
      minY = Math.min(minY, y);
      maxX = Math.max(maxX, x + w);
      maxY = Math.max(maxY, y + h);
    });
    const wrap = document.getElementById('canvas-wrap');
    const ww = wrap.offsetWidth, wh = wrap.offsetHeight;
    const cw = maxX - minX + 200, ch = maxY - minY + 200;
    scale = Math.min(ww / cw, wh / ch, 1);
    panX = (ww - (maxX - minX) * scale) / 2 - minX * scale;
    panY = (wh - (maxY - minY) * scale) / 2 - minY * scale;
    if (animate) canvas.classList.add('animate');
    applyTransform();
    setTimeout(() => canvas.classList.remove('animate'), 300);
  }

  // ============================================================
  // SEARCH
  // ============================================================
  function setupSearch() {
    const input = document.getElementById('search');
    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      document.querySelectorAll('.node').forEach(el => {
        if (!q) { el.classList.remove('dim'); return; }
        const text = el.textContent.toLowerCase();
        el.classList.toggle('dim', !text.includes(q));
      });
    });
  }

  // ============================================================
  // UTILS
  // ============================================================
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function truncate(s, n) {
    if (!s) return '';
    return s.length > n ? '…' + s.slice(-n + 1) : s;
  }

  // Boot
  init();
</script>
